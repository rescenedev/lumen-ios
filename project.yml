# XcodeGen spec for the iOS app. Generate with: xcodegen generate (repo root)
# (no binary .xcodeproj is committed — this file is the source of truth)
name: LumenIOS
options:
  bundleIdPrefix: dev.rescene
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Korean is the source language (string-catalog keys are Korean); English
  # ships via Sources/Localizable.xcstrings + InfoPlist.xcstrings.
  developmentLanguage: ko

schemes:
  LumenIOS:
    build:
      targets:
        LumenIOS: all
        LumenIOSTests: all
    test:
      targets:
        - LumenIOSTests

targets:
  LumenIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    # presentLimitedLibraryPicker(from:) is a PhotosUI category on PHPhotoLibrary.
    # `import PhotosUI` compiles, but the category selector is only registered at
    # runtime if PhotosUI is actually linked — otherwise it crashes with an
    # unrecognized selector. Link it explicitly.
    dependencies:
      - sdk: PhotosUI.framework
    info:
      path: Sources/Info.plist
      properties:
        # .limited users get our in-app banner + 더 선택하기 instead of the
        # system's occasional "manage limited access" alert on launch.
        PHPhotoLibraryPreventAutomaticLimitedAccessAlert: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.rescene.lumen
        # Signing baked in so `xcodegen generate` never wipes the team again.
        DEVELOPMENT_TEAM: 589U6DQJN8
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lumen
        # Dark app-wide → the generated launch screen is black, not white (no flash).
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Lumen shows your photo library so you can browse and organize it."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Lumen saves edited and combined photos to your library."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  # Logic-test bundle (no host app): compiles the engine + XCTest cases so the
  # shared ImageEditor is verified on the iOS simulator too.
  LumenIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources/Shared/ImageEditor.swift
      # Pure-logic app types under test, compiled straight into the bundle.
      - path: Sources/OrganizeSession.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.rescene.lumen.tests
        DEVELOPMENT_TEAM: 589U6DQJN8
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
